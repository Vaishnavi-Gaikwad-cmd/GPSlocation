<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Firebase Image Map Viewer</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #f5f5f5; color: #1a1a1a; }

  header { background: #fff; border-bottom: 1px solid #e0e0e0; padding: 14px 24px; display: flex; align-items: center; gap: 12px; }
  header h1 { font-size: 18px; font-weight: 500; }
  .dot { width: 10px; height: 10px; border-radius: 50%; background: #34a853; }

  .layout { display: flex; height: calc(100vh - 53px); }

  #map { flex: 1; }

  .sidebar { width: 320px; background: #fff; border-left: 1px solid #e0e0e0; display: flex; flex-direction: column; overflow: hidden; }

  .sidebar-header { padding: 16px; border-bottom: 1px solid #e0e0e0; font-size: 13px; font-weight: 500; color: #555; text-transform: uppercase; letter-spacing: 0.05em; }

  .entries { flex: 1; overflow-y: auto; }

  .entry-card { padding: 14px 16px; border-bottom: 1px solid #f0f0f0; cursor: pointer; transition: background 0.15s; }
  .entry-card:hover { background: #f8f8f8; }
  .entry-card.active { background: #e8f5e9; border-left: 3px solid #34a853; }

  .entry-card img { width: 100%; height: 140px; object-fit: cover; border-radius: 8px; margin-bottom: 10px; background: #eee; }
  .entry-card .label { font-size: 14px; font-weight: 500; margin-bottom: 4px; }
  .entry-card .coords { font-size: 12px; color: #888; font-family: monospace; }
  .entry-card .note { font-size: 12px; color: #555; margin-top: 4px; }

  .no-entries { padding: 32px 16px; text-align: center; color: #aaa; font-size: 14px; }

  .info-window img { width: 220px; height: 140px; object-fit: cover; border-radius: 8px; margin-bottom: 8px; }
  .info-window .iw-label { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
  .info-window .iw-coords { font-size: 12px; color: #666; font-family: monospace; }
  .info-window .iw-note { font-size: 13px; color: #444; margin-top: 6px; }

  .status-bar { padding: 10px 16px; font-size: 12px; color: #888; border-top: 1px solid #eee; }

  /* Loading overlay */
  #loading { position: fixed; inset: 0; background: rgba(255,255,255,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; z-index: 999; }
  .spinner { width: 36px; height: 36px; border: 3px solid #eee; border-top-color: #4285F4; border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading p { font-size: 14px; color: #666; }
</style>
</head>
<body>

<!-- ═══════════════════════════════════════════════
     CONFIGURATION — fill these in
═══════════════════════════════════════════════ -->
<script>
const CONFIG = {
  // 1. Your Firebase project config (from Firebase Console → Project Settings)
  firebase: {
    apiKey:            "YOUR_FIREBASE_API_KEY",
    authDomain:        "YOUR_PROJECT_ID.firebaseapp.com",
    databaseURL:       "https://YOUR_PROJECT_ID-default-rtdb.firebaseio.com",
    projectId:         "YOUR_PROJECT_ID",
    storageBucket:     "YOUR_PROJECT_ID.appspot.com",
    messagingSenderId: "YOUR_SENDER_ID",
    appId:             "YOUR_APP_ID"
  },

  // 2. Your Google Maps API key
  googleMapsKey: "YOUR_GOOGLE_MAPS_API_KEY",

  // 3. Firebase Realtime DB path where entries are stored
  dbPath: "entries"
};
</script>
<!-- ════════════════════════════════════════════ -->

<div id="loading">
  <div class="spinner"></div>
  <p>Loading map...</p>
</div>

<header>
  <div class="dot"></div>
  <h1>Image Map Viewer</h1>
</header>

<div class="layout">
  <div id="map"></div>
  <div class="sidebar">
    <div class="sidebar-header">📍 Entries</div>
    <div class="entries" id="entry-list">
      <div class="no-entries">Loading entries...</div>
    </div>
    <div class="status-bar" id="status">Connecting to Firebase...</div>
  </div>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
// ── Init Firebase ─────────────────────────────
firebase.initializeApp(CONFIG.firebase);
const db = firebase.database();

let map, markers = {}, infoWindow, allEntries = {};

// ── Load Google Maps ──────────────────────────
function loadGoogleMaps() {
  const s = document.createElement('script');
  s.src = `https://maps.googleapis.com/maps/api/js?key=${CONFIG.googleMapsKey}&callback=initMap`;
  s.async = true;
  s.defer = true;
  document.head.appendChild(s);
}

// ── Init Map ──────────────────────────────────
window.initMap = function() {
  map = new google.maps.Map(document.getElementById('map'), {
    center: { lat: 20.5937, lng: 78.9629 },  // India center default
    zoom: 5,
    mapTypeControl: false,
    fullscreenControl: false,
    streetViewControl: false,
    styles: [
      { featureType: "poi", stylers: [{ visibility: "off" }] }
    ]
  });

  infoWindow = new google.maps.InfoWindow();
  document.getElementById('loading').style.display = 'none';
  loadEntries();
};

// ── Load entries from Firebase ────────────────
function loadEntries() {
  const ref = db.ref(CONFIG.dbPath);

  ref.on('value', (snapshot) => {
    const data = snapshot.val();
    clearMarkers();
    allEntries = {};

    if (!data) {
      document.getElementById('entry-list').innerHTML =
        '<div class="no-entries">No entries yet.<br>Add data to Firebase to see it here.</div>';
      document.getElementById('status').textContent = 'No entries found';
      return;
    }

    const keys = Object.keys(data);
    keys.forEach(key => {
      const entry = data[key];
      allEntries[key] = entry;
      addMarker(key, entry);
    });

    renderSidebar();
    document.getElementById('status').textContent = `${keys.length} entr${keys.length === 1 ? 'y' : 'ies'} loaded`;

    // Fit map to all markers
    if (keys.length > 0) fitMapToMarkers();
  });
}

// ── Add a marker to the map ───────────────────
function addMarker(key, entry) {
  const lat = parseFloat(entry.lat);
  const lng = parseFloat(entry.lng);
  if (isNaN(lat) || isNaN(lng)) return;

  const marker = new google.maps.Marker({
    position: { lat, lng },
    map,
    title: entry.label || 'Entry',
    animation: google.maps.Animation.DROP
  });

  marker.addListener('click', () => openInfo(key, entry, marker));
  markers[key] = marker;
}

// ── Open info window on marker ────────────────
function openInfo(key, entry, marker) {
  const imgTag = entry.imageUrl
    ? `<img src="${entry.imageUrl}" alt="${entry.label || ''}" style="width:220px;height:140px;object-fit:cover;border-radius:8px;margin-bottom:8px;display:block;">`
    : `<div style="width:220px;height:90px;background:#eee;border-radius:8px;display:flex;align-items:center;justify-content:center;margin-bottom:8px;color:#aaa;font-size:13px;">No image</div>`;

  infoWindow.setContent(`
    <div style="font-family:system-ui,sans-serif;padding:4px;">
      ${imgTag}
      <div style="font-size:15px;font-weight:600;margin-bottom:4px;">${entry.label || 'Untitled'}</div>
      <div style="font-size:12px;color:#666;font-family:monospace;">${entry.lat}, ${entry.lng}</div>
      ${entry.note ? `<div style="font-size:13px;color:#444;margin-top:6px;">${entry.note}</div>` : ''}
    </div>
  `);
  infoWindow.open(map, marker);
  map.panTo(marker.getPosition());

  // Highlight sidebar card
  document.querySelectorAll('.entry-card').forEach(c => c.classList.remove('active'));
  const card = document.getElementById('card-' + key);
  if (card) { card.classList.add('active'); card.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }
}

// ── Render sidebar list ───────────────────────
function renderSidebar() {
  const list = document.getElementById('entry-list');
  const keys = Object.keys(allEntries);
  if (keys.length === 0) {
    list.innerHTML = '<div class="no-entries">No entries found.</div>';
    return;
  }

  list.innerHTML = keys.map(key => {
    const e = allEntries[key];
    const imgTag = e.imageUrl
      ? `<img src="${e.imageUrl}" alt="${e.label || ''}"/>`
      : `<div style="width:100%;height:100px;background:#f0f0f0;border-radius:8px;display:flex;align-items:center;justify-content:center;margin-bottom:10px;color:#bbb;font-size:13px;">No image</div>`;
    return `
      <div class="entry-card" id="card-${key}" onclick="clickCard('${key}')">
        ${imgTag}
        <div class="label">${e.label || 'Untitled'}</div>
        <div class="coords">${e.lat}, ${e.lng}</div>
        ${e.note ? `<div class="note">${e.note}</div>` : ''}
      </div>`;
  }).join('');
}

// ── Click sidebar card ────────────────────────
window.clickCard = function(key) {
  const entry = allEntries[key];
  const marker = markers[key];
  if (marker) openInfo(key, entry, marker);
};

// ── Clear all markers ─────────────────────────
function clearMarkers() {
  Object.values(markers).forEach(m => m.setMap(null));
  markers = {};
}

// ── Fit map bounds to all markers ────────────
function fitMapToMarkers() {
  const bounds = new google.maps.LatLngBounds();
  Object.values(markers).forEach(m => bounds.extend(m.getPosition()));
  map.fitBounds(bounds);
  if (Object.keys(markers).length === 1) map.setZoom(14);
}

// ── Start ─────────────────────────────────────
loadGoogleMaps();
</script>
</body>
</html>
