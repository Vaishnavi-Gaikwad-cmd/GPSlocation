<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Location Map Viewer</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #f5f5f5; color: #1a1a1a; }
  header { background: #fff; border-bottom: 1px solid #e0e0e0; padding: 14px 24px; display: flex; align-items: center; gap: 10px; }
  header h1 { font-size: 17px; font-weight: 500; }
  .dot { width: 10px; height: 10px; border-radius: 50%; background: #34a853; }
  .layout { display: flex; height: calc(100vh - 53px); }
  #map { flex: 1; }
  .sidebar { width: 280px; background: #fff; border-left: 1px solid #e0e0e0; display: flex; flex-direction: column; overflow: hidden; }
  .sidebar-header { padding: 14px 16px; border-bottom: 1px solid #e0e0e0; font-size: 12px; font-weight: 500; color: #777; text-transform: uppercase; letter-spacing: 0.05em; }
  .entries { flex: 1; overflow-y: auto; }
  .entry-card { padding: 14px 16px; border-bottom: 1px solid #f0f0f0; cursor: pointer; transition: background 0.15s; }
  .entry-card:hover { background: #f8f8f8; }
  .entry-card.active { background: #e8f5e9; border-left: 3px solid #34a853; }
  .entry-label { font-size: 14px; font-weight: 500; margin-bottom: 4px; }
  .entry-coords { font-size: 12px; color: #888; font-family: monospace; }
  .entry-note { font-size: 12px; color: #555; margin-top: 4px; }
  .no-entries { padding: 32px 16px; text-align: center; color: #aaa; font-size: 14px; line-height: 1.6; }
  .status-bar { padding: 10px 16px; font-size: 12px; color: #888; border-top: 1px solid #eee; }
  #loading { position: fixed; inset: 0; background: rgba(255,255,255,0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; z-index: 999; }
  .spinner { width: 32px; height: 32px; border: 3px solid #eee; border-top-color: #4285F4; border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading p { font-size: 14px; color: #666; }
</style>
</head>
<body>

<!-- ══════════════════════════════════════════

══════════════════════════════════════════ -->
<script>
const CONFIG = {
  firebase: {
    apiKey:            "AIzaSyDzJ7LFIn33PJhY-nHHtjMBX9Pz_aNPU88",
    authDomain:        "location-serverasdf.firebaseapp.com",
    databaseURL:       "https://location-serverasdf-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId:         "location-serverasdf",
    storageBucket:     "location-serverasdf.firebasestorage.app",
    messagingSenderId: "597743196862",
    appId:             "1:597743196862:web:2e3f90b8ce0145cc6ddcef"
  },
  googleMapsKey: "AIzaSyAM4ySn3UTyXt9ajwpu9E045_Y_mtzMN5U",
  dbPath: "entries"
};
</script>
<!-- ══════════════════════════════════════════ -->

<div id="loading">
  <div class="spinner"></div>
  <p>Loading map...</p>
</div>

<header>
  <div class="dot"></div>
  <h1>Location Map Viewer</h1>
</header>

<div class="layout">
  <div id="map"></div>
  <div class="sidebar">
    <div class="sidebar-header">📍 Locations</div>
    <div class="entries" id="entry-list">
      <div class="no-entries">Connecting to Firebase...</div>
    </div>
    <div class="status-bar" id="status">Starting...</div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
firebase.initializeApp(CONFIG.firebase);
const db = firebase.database();

let map, markers = {}, infoWindow, allEntries = {};

function loadGoogleMaps() {
  const s = document.createElement('script');
  s.src = `https://maps.googleapis.com/maps/api/js?key=${CONFIG.googleMapsKey}&callback=initMap`;
  s.async = true;
  document.head.appendChild(s);
}

window.initMap = function() {
  map = new google.maps.Map(document.getElementById('map'), {
    center: { lat: 20.5937, lng: 78.9629 },
    zoom: 5,
    mapTypeControl: false,
    fullscreenControl: false,
    streetViewControl: false
  });
  infoWindow = new google.maps.InfoWindow();
  document.getElementById('loading').style.display = 'none';
  loadEntries();
};

function loadEntries() {
  db.ref(CONFIG.dbPath).on('value', (snapshot) => {
    const data = snapshot.val();
    clearMarkers();
    allEntries = {};

    if (!data) {
      document.getElementById('entry-list').innerHTML =
        '<div class="no-entries">No entries yet.<br><br>Add data in Firebase Realtime Database under <b>entries/</b></div>';
      document.getElementById('status').textContent = 'No entries found';
      return;
    }

    Object.keys(data).forEach(key => {
      allEntries[key] = data[key];
      addMarker(key, data[key]);
    });

    renderSidebar();
    fitMap();
    document.getElementById('status').textContent =
      `${Object.keys(data).length} location(s) loaded`;
  });
}

function addMarker(key, entry) {
  const lat = parseFloat(entry.lat);
  const lng = parseFloat(entry.lng);
  if (isNaN(lat) || isNaN(lng)) return;

  const marker = new google.maps.Marker({
    position: { lat, lng },
    map,
    title: entry.label || 'Location',
    animation: google.maps.Animation.DROP
  });

  marker.addListener('click', () => openInfo(key, entry, marker));
  markers[key] = marker;
}

function openInfo(key, entry, marker) {
  infoWindow.setContent(`
    <div style="font-family:system-ui,sans-serif;padding:4px;min-width:160px;">
      <div style="font-size:15px;font-weight:600;margin-bottom:6px;">${entry.label || 'Untitled'}</div>
      <div style="font-size:12px;color:#666;font-family:monospace;margin-bottom:4px;">
        Lat: ${entry.lat}<br>Lng: ${entry.lng}
      </div>
      ${entry.note ? `<div style="font-size:13px;color:#444;margin-top:6px;">${entry.note}</div>` : ''}
    </div>
  `);
  infoWindow.open(map, marker);
  map.panTo(marker.getPosition());

  document.querySelectorAll('.entry-card').forEach(c => c.classList.remove('active'));
  const card = document.getElementById('card-' + key);
  if (card) { card.classList.add('active'); card.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }
}

function renderSidebar() {
  const keys = Object.keys(allEntries);
  document.getElementById('entry-list').innerHTML = keys.map(key => {
    const e = allEntries[key];
    return `
      <div class="entry-card" id="card-${key}" onclick="clickCard('${key}')">
        <div class="entry-label">${e.label || 'Untitled'}</div>
        <div class="entry-coords">${e.lat}, ${e.lng}</div>
        ${e.note ? `<div class="entry-note">${e.note}</div>` : ''}
      </div>`;
  }).join('');
}

window.clickCard = function(key) {
  const marker = markers[key];
  if (marker) openInfo(key, allEntries[key], marker);
};

function clearMarkers() {
  Object.values(markers).forEach(m => m.setMap(null));
  markers = {};
}

function fitMap() {
  const keys = Object.keys(markers);
  if (keys.length === 0) return;
  const bounds = new google.maps.LatLngBounds();
  Object.values(markers).forEach(m => bounds.extend(m.getPosition()));
  map.fitBounds(bounds);
  if (keys.length === 1) map.setZoom(14);
}

loadGoogleMaps();
</script>
</body>
</html>
